<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>TOKENTOWN</title>
<style>
  :root{
    --panel:#1e1826; --panel2:#171220; --edge-hi:#4a3b52;
    --amber:#f2b47a; --amber-dk:#c9895a; --gold:#ffd79a;
    --teal:#7fc7bf; --ink:#efe6df; --mute:#a99bb0; --faint:#6b5f76;
    --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent;font-family:var(--mono);-webkit-font-smoothing:antialiased;
    color:var(--ink);overflow:hidden;user-select:none}
  body{padding:9px;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end}
  .card{position:relative;background:linear-gradient(180deg,var(--edge-hi),var(--panel) 14%,var(--panel2));
    border:1px solid #0e0a16;border-radius:14px;padding:9px 10px 11px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.09),inset 0 -2px 0 rgba(0,0,0,.4),
      0 20px 40px -16px rgba(0,0,0,.7),0 6px 16px -6px rgba(0,0,0,.55)}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:1px 3px 8px;-webkit-app-region:drag}
  .brand{font-size:11px;font-weight:800;letter-spacing:.15em;color:var(--gold);text-shadow:1px 1px 0 rgba(201,137,90,.5)}
  .right{display:flex;align-items:center;gap:9px;-webkit-app-region:no-drag}
  .live{display:flex;align-items:center;gap:5px;font-size:8px;letter-spacing:.12em;color:var(--teal);text-transform:uppercase}
  .live .led{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:pulse 1.7s ease-in-out infinite}
  .live.off{color:var(--faint)}.live.off .led{background:var(--faint);box-shadow:none;animation:none}
  /* aguardando a decisão da Mel: âmbar discreto (não é "terminou" nem "ao vivo") */
  .live.decision{color:var(--amber)}
  .live.decision .led{background:var(--amber);box-shadow:0 0 6px var(--amber);animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.35}}
  .x{-webkit-app-region:no-drag;width:15px;height:15px;border-radius:50%;border:none;cursor:pointer;
    background:#332636;color:var(--mute);font-size:11px;line-height:1;font-family:var(--mono)}
  .x:hover{background:#4a3648;color:var(--ink)}
  .recreio{-webkit-app-region:no-drag;font-family:var(--mono);cursor:pointer;font-size:8px;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:8px;color:var(--gold);
    background:#241b30;border:1px solid #3a2c48;line-height:1;transition:filter .12s,transform .05s}
  .recreio:hover{filter:brightness(1.25);background:#2b2038}
  .recreio:active{transform:translateY(1px)}
  .recreio:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .recreio[hidden]{display:none}
  .view{position:relative;border-radius:8px;overflow:hidden;background:#0a0710;border:2px solid #0c0812;aspect-ratio:256/144}
  .view canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
  .view::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(rgba(0,0,0,0) 60%,rgba(0,0,0,.14) 50%);background-size:100% 4px;box-shadow:inset 0 0 30px rgba(0,0,0,.4)}
  .readout{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:8px 3px 2px;font-size:10px;color:var(--mute)}
  .readout .tokwrap{display:flex;flex-direction:column;gap:1px}
  .readout .tok{font-size:14px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums}
  .readout .tok small{font-size:9px;color:var(--amber-dk);font-weight:600}
  .readout .cost{font-size:9px;font-weight:600;color:var(--amber-dk);letter-spacing:.02em;font-variant-numeric:tabular-nums}
  .readout .meta{display:flex;gap:9px}
  .readout .meta b{color:var(--teal);font-variant-numeric:tabular-nums}
  .controls{display:flex;gap:7px;margin-top:8px}
  button.act{font-family:var(--mono);cursor:pointer;border:none;color:var(--ink);letter-spacing:.05em;transition:transform .05s,filter .12s}
  button.act:active{transform:translateY(1px)}
  button.act:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .btn-prompt{flex:1;font-size:11px;font-weight:700;text-transform:uppercase;padding:9px;border-radius:9px;
    color:#2c1a0a;background:linear-gradient(180deg,var(--amber),var(--amber-dk));box-shadow:0 3px 0 #8a5a34}
  .btn-prompt:active{box-shadow:0 1px 0 #8a5a34}
  .toggle{font-size:9px;font-weight:700;text-transform:uppercase;padding:0 12px;border-radius:9px;
    background:#241b30;color:var(--teal);border:1px solid #362a44;line-height:1.25}
  .toggle.off{color:var(--faint)}
  .float{position:absolute;pointer-events:none;font-size:11px;font-weight:700;color:var(--gold);
    text-shadow:0 1px 0 rgba(201,137,90,.6);z-index:5;animation:rise 1.3s ease-out forwards}
  @keyframes rise{0%{opacity:0;transform:translateY(4px)}18%{opacity:1}100%{opacity:0;transform:translateY(-30px)}}

  /* faixa calma abaixo do readout: temporada, vontade e nota de marco/construção */
  .extra{display:flex;flex-direction:column;gap:4px;padding:3px 3px 0}
  .season{font-size:8.5px;letter-spacing:.06em;color:var(--faint);text-transform:lowercase}
  .wish{font-size:9px;font-style:italic;color:var(--mute);line-height:1.35}
  .wish[hidden]{display:none}
  .note{font-size:9px;letter-spacing:.03em;color:var(--gold);opacity:.92;
    animation:noteIn .8s ease-out}
  .note[hidden]{display:none}
  @keyframes noteIn{0%{opacity:0}100%{opacity:.92}}

  /* AVISO ATIVO: a borda da janelinha PULSA suave por ~3s na transição de estado —
     âmbar (mais chamativo) p/ 'decision', teal neutro p/ 'idle' — reforçando o LED e a
     notificação do sistema. Pseudo-anel sobre o card; só a cor muda por classe (game.js
     adiciona/remove pulse-decision|pulse-idle). reduced-motion desliga o pulso (mantém
     LED + notificação). */
  .card::after{content:"";position:absolute;inset:-1px;border-radius:15px;pointer-events:none;opacity:0;
    box-shadow:0 0 0 2px var(--pulse-c,transparent),0 0 20px 3px var(--pulse-glow,transparent)}
  .card.pulse-decision{--pulse-c:var(--amber);--pulse-glow:rgba(242,180,122,.55)}
  .card.pulse-idle{--pulse-c:var(--teal);--pulse-glow:rgba(127,199,191,.42)}
  .card.pulse-decision::after,.card.pulse-idle::after{animation:cardPulse 1.5s ease-in-out 2}
  @keyframes cardPulse{0%,100%{opacity:0}50%{opacity:1}}
  @media (prefers-reduced-motion:reduce){.float{animation-duration:.7s}.note{animation:none}
    .card.pulse-decision::after,.card.pulse-idle::after{animation:none;opacity:0}}
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="bar">
      <div class="brand">◍ TOKENTOWN</div>
      <div class="right">
        <button class="recreio" id="recreio" type="button" hidden>▶ recreio</button>
        <div class="live" id="live"><span class="led"></span><span id="liveTxt">agente ao vivo</span></div>
        <button class="x" id="close" title="fechar" aria-label="fechar">×</button>
      </div>
    </div>
    <div class="view"><canvas id="scene" width="256" height="144"></canvas></div>
    <div class="readout">
      <div class="tokwrap">
        <div class="tok" id="tok">0 <small>tokens</small></div>
        <div class="cost" id="cost">≈ US$ 0,00</div>
      </div>
      <div class="meta"><span>prédios <b id="builds">0</b></span><span>população <b id="pop">0</b></span></div>
    </div>
    <div class="extra">
      <div class="season" id="season"></div>
      <div class="wish" id="wish" hidden></div>
      <div class="note" id="note" hidden></div>
    </div>
  </div>
  <script>
    var _c = document.getElementById('close');
    if(_c) _c.addEventListener('click', function(){ window.close(); });
  </script>
  <script src="game.js"></script>
</body>
</html>
